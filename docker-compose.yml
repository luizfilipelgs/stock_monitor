services:
  api:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: sqlite:////data/stocks.db
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      CELERY_TIMEZONE: America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - stock-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: celery -A tasks:app worker --loglevel=info -E
    environment:
      DATABASE_URL: sqlite:////data/stocks.db
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      CELERY_TIMEZONE: America/Sao_Paulo
    volumes:
      - stock-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  beat:
    build: .
    command: celery -A tasks:app beat --loglevel=info
    environment:
      DATABASE_URL: sqlite:////data/stocks.db
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      CELERY_TIMEZONE: America/Sao_Paulo
    volumes:
      - stock-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  flower:
    build: .
    command: celery -A tasks:app flower --port=5555
    environment:
      DATABASE_URL: sqlite:////data/stocks.db
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      CELERY_TIMEZONE: America/Sao_Paulo
    ports:
      - "5555:5555"
    volumes:
      - stock-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  stock-data:
